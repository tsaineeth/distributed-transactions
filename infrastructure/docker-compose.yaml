  coordinator:
    build:
      context: ..
      dockerfile: services/coordinator/Dockerfile

    container_name: coordinator

    restart: unless-stopped

#    depends_on:
#      postgres:
#        condition: service_healthy
#      rabbitmq:
#        condition: service_healthy

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/coordinator
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      SERVICE_NAME: coordinator

    networks:
      - dt-network

  inventory:
    build:
      context: ..
      dockerfile: services/inventory/Dockerfile

    container_name: inventory

    restart: unless-stopped

#    depends_on:
#      postgres:
#        condition: service_healthy
#      rabbitmq:
#        condition: service_healthy

    ports:
      - "8001:8000"

    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/inventory
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      SERVICE_NAME: inventory

    networks:
      - dt-network

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  dt-network:
    driver: bridge