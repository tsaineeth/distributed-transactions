name: distributed-transactions

services:
  postgres:
    image: postgres:17

    container_name: dt-postgres

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - dt-network

  rabbitmq:
    image: rabbitmq:4-management

    container_name: dt-rabbitmq

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5672:5672"
      - "15672:15672"

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - dt-network

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  dt-network:
    driver: bridge